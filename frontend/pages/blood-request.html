<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blood Request Form</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
.container { max-width: 600px; margin-top: 50px; }
.glass { background: rgba(255,255,255,0.9); padding: 30px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
h2 { color: #e63946; margin-bottom: 20px; text-align: center; }
.btn-submit { background-color: #550303; color: #fff; font-weight: 600; }
.btn-submit:hover { background-color: #e63946; color: #fff; }
</style>
</head>
<body>
<div class="container glass">
<h2>Blood Request Form</h2>
<form id="bloodRequestForm">
  <div class="mb-3">
    <label for="photo" class="form-label">Photo (optional)</label>
    <input type="file" class="form-control" id="photo" name="photo">
  </div>
  <div class="mb-3">
    <input type="text" class="form-control" name="name" placeholder="Full Name" required>
  </div>
  <div class="mb-3">
    <input type="email" class="form-control" name="email" placeholder="Email" required>
  </div>
  <div class="mb-3">
    <input type="text" class="form-control" name="mobile" placeholder="Mobile Number" pattern="[0-9]{10}" required>
  </div>
  <div class="mb-3">
    <input type="text" class="form-control" name="address" placeholder="Address" required>
  </div>
  <div class="mb-3">
    <select name="bloodGroup" class="form-control" required>
      <option value="" disabled selected>Select Blood Group</option>
      <option>A+</option><option>A-</option><option>B+</option><option>B-</option>
      <option>O+</option><option>O-</option><option>AB+</option><option>AB-</option>
    </select>
  </div>
  <div class="mb-3">
    <input type="number" class="form-control" name="units" placeholder="Units Required" min="1" required>
  </div>
  <button type="submit" class="btn btn-submit w-100">Submit Request</button>
</form>
<div id="successMessage" class="alert alert-success mt-3 d-none">Request submitted successfully!</div>
</div>
<script src="../js/main.js"></script>
</body>
</html>
