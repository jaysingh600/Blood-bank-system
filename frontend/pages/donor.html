<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Donor Request - Hospital</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: #f5f5f5; }
.glass { background: #fff; padding: 2rem; border-radius: 15px; box-shadow: 0 8px 25px rgba(0,0,0,0.15); margin-top: 2rem; }
h2 { color: #e63946; margin-bottom: 1.5rem; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <form id="donorForm" class="glass">
    <h2>Donor Request</h2>
    <input name="name" class="form-control mb-2" placeholder="Name" required>
    <input name="email" class="form-control mb-2" placeholder="Email" type="email" required>
    <input name="mobile" class="form-control mb-2" placeholder="Mobile" required pattern="[0-9]{10}">
    <input name="address" class="form-control mb-2" placeholder="Address" required>
    <select name="bloodGroup" class="form-control mb-2" required>
      <option value="">Select Blood Group</option>
      <option>A+</option><option>A-</option>
      <option>B+</option><option>B-</option>
      <option>O+</option><option>O-</option>
      <option>AB+</option><option>AB-</option>
    </select>
    <input name="units" type="number" class="form-control mb-2" placeholder="Units" min="1" required>
    <input name="photo" type="file" class="form-control mb-2" accept="image/*" required>
    <button class="btn btn-success w-100">Submit</button>
  </form>
</div>

<script>
document.getElementById('donorForm').addEventListener('submit', function(e){
  e.preventDefault();
  alert("Donor request submitted! Waiting for admin approval.");
  this.reset();
});
</script>
<script src="../js/main.js"></script>

</body>
</html>
