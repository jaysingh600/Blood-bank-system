<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard - Blood & Donor</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Poppins", sans-serif;
        background: #f5f5f5;
      }
      .navbar {
        background: #550303;
      }
      .navbar a {
        color: #fff;
        font-weight: 600;
        margin-right: 1rem;
      }
      .navbar a:hover {
        color: #ff4b5c;
      }
      .section-title {
        color: #e63946;
        margin: 1.5rem 0;
      }
      .table img {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
      }
      .status-badge {
        padding: 0.3rem 0.6rem;
        border-radius: 10px;
        font-size: 0.8rem;
        color: #fff;
      }
      .status-pending {
        background: #ffc107;
      }
      .status-approved {
        background: #28a745;
      }
      .status-rejected {
        background: #dc3545;
      }
      .btn-action {
        padding: 0.25rem 0.5rem;
        font-size: 0.8rem;
        border-radius: 10px;
      }
      .inventory-card {
        border-radius: 15px;
        padding: 1rem;
        text-align: center;
        color: #0c0c0c;
        margin-bottom: 1rem;
      }
      .bg-A + {
        background: #e63946;
      }
      .bg-B + {
        background: #f77f00;
      }
      .bg-O + {
        background: #2a9d8f;
      }
      .bg-AB + {
        background: #8ac926;
      }
    </style>
  </head>
  <body id="adminPage">
    <nav class="navbar navbar-expand-lg navbar-dark px-4">
      <a class="navbar-brand" href="#">Blood & Donor Admin</a>
      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a href="index.html" class="nav-link">Home</a>
          </li>
          <li class="nav-item">
            <a href="#" id="logoutBtn" class="nav-link">Logout</a>
          </li>
        </ul>
      </div>
    </nav>

    <div class="container-fluid mt-4">
      <!-- Blood Inventory -->
      <h2 class="section-title">Blood Inventory</h2>
      <div class="row mb-4">
        <div class="col-md-3">
          <div class="inventory-card bg-A+">
            A+ : <span id="blood-A+">0</span> units
          </div>
        </div>
        <div class="col-md-3">
          <div class="inventory-card bg-B+">
            B+ : <span id="blood-B+">0</span> units
          </div>
        </div>
        <div class="col-md-3">
          <div class="inventory-card bg-O+">
            O+ : <span id="blood-O+">0</span> units
          </div>
        </div>
        <div class="col-md-3">
          <div class="inventory-card bg-AB+">
            AB+ : <span id="blood-AB+">0</span> units
          </div>
        </div>
      </div>

      <!-- Donor Requests -->
      <h2 class="section-title">Donor Requests</h2>
      <div class="table-responsive mb-4">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Name</th>
              <th>Blood Group</th>
              <th>Units</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="donorTable"></tbody>
        </table>
      </div>

      <!-- Blood Requests -->
      <h2 class="section-title">Blood Requests</h2>
      <div class="table-responsive mb-4">
        <table class="table table-hover">
          <thead>
            <tr>
              <th>Photo</th>
              <th>Name</th>
              <th>Blood Group</th>
              <th>Units Needed</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="requestTable"></tbody>
        </table>
      </div>
    </div>

    <script src="../js/main.js"></script>
  </body>
</html>
