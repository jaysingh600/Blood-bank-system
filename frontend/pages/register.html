<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - Blood & Donor</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
      margin: 0;
    }

    /* Navbar */
    .header {
      position: fixed;
      top: 0;
      width: 100%;
      padding: 15px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    .logo {
      color: #fff;
      font-weight: 600;
      font-size: 22px;
    }

    .nav a {
      color: #fff;
      margin-left: 20px;
      text-decoration: none;
      font-size: 14px;
    }

    .nav a:hover {
      color: #ff4d4d;
    }

    /* Main Section */
    .main {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1615461066159-fea0960485d5') no-repeat center center/cover;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 100px 50px 50px;
    }

    /* Left Content */
    .left-content {
      color: rgb(230, 23, 23);
      max-width: 50%;
    }

    .left-content h1 {
      font-size: 42px;
      font-weight: 600;
    }

    .left-content p {
      margin-top: 15px;
      font-size: 18px;
      line-height: 1.6;
    }

    /* Glass Form */
    .glass {
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(15px);
      border-radius: 15px;
      padding: 30px;
      color: white;
      width: 400px;
    }

    input, select {
      background: rgba(255,255,255,0.2) !important;
      border: none !important;
      color: white !important;
      margin-bottom: 12px;
    }

    input::placeholder {
      color: #ddd;
    }

    select {
      color: #fff;
    }

    option {
      color: #000;
    }

    .btn-custom {
      background: #ff4d4d;
      border: none;
      color: white;
      width: 100%;
    }

    .btn-custom:hover {
      background: #e60000;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <header class="header">
    <div class="logo">Blood & Donor</div>
    <nav class="nav">
      <a href="#home">Home</a>
      <a href="#stats">Stats</a>
      <a href="login.html">Login</a>
      <a href="register.html">Register</a>
      <a href="admin-dashboard.html">Admin</a>
      <a href="hospital-dashboard.html">Hospital</a>
    </nav>
  </header>

  <!-- Main Section -->
  <div class="main">

    <!-- Left Side -->
    <div class="left-content">
      <h1>Join Us & Save Lives ❤️</h1>
      <p>
        Register today and become a part of our life-saving community.
        Whether you're a donor, requester, or hospital, your contribution
        can make a huge impact.
      </p>
    </div>

    <!-- Register Form -->
    <form id="registerForm" class="glass shadow">
      <h2 class="text-center mb-4">Register</h2>

      <input class="form-control" name="name" placeholder="Full Name" required>
      <input class="form-control" name="email" placeholder="Email" type="email" required>
      <input class="form-control" name="password" placeholder="Password" type="password" required>

      <select class="form-control" name="role" required>
        <option value="">Select Role</option>
        <option value="donor">Donor</option>
        <option value="requester">Blood Request Person</option>
        <option value="hospital">Hospital</option>
        <option value="admin">Admin</option>
      </select>

      <button type="submit" class="btn btn-custom mt-2">Register</button>

      <p class="text-center mt-3">
        Already have an account?
        <a href="login.html" class="text-warning">Login</a>
      </p>
    </form>

  </div>

  <script src="../js/main.js"></script>

</body>
</html>
